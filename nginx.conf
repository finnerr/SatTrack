server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy CelesTrak requests (live TLE catalog refresh)
    # Mirrors the Vite dev server proxy in vite.config.ts
    location /celestrak/ {
        proxy_pass https://celestrak.org/;
        proxy_ssl_server_name on;
        proxy_set_header Host celestrak.org;
        proxy_set_header User-Agent "SatTrack/1.0 (satellite tracking application)";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin * always;
    }

    # Cache static assets aggressively, never cache index.html
    location ~* \.(js|css|png|svg|ico|woff2?|ttf|geojson)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
